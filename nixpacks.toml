# Force Nixpacks to detect and install both Node.js and Python
providers = ["node", "python"]

[variables]
NIXPACKS_NO_CACHE = "1"

[phases.setup]
nixPkgs = ["nodejs-20_x", "python311", "npm-9_x"]

[phases.install]
cmds = ["npm install", "pip install -r requirements.txt"]

[phases.build]
cmds = ["npm run build"]

[start]
cmd = "uvicorn server:app --host 0.0.0.0 --port $PORT"
